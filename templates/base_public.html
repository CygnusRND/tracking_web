<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Parcel Tracker{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/site.css">
</head>
<body class="public">
    <div class="bg-orbit"></div>
    <header class="site-header">
        <div class="brand">Parcel Pulse</div>
        <nav class="site-nav">
            <a href="/">Track</a>
        </nav>
    </header>

    <main class="page">{% block content %}{% endblock %}</main>

    <footer class="site-footer">
        <span>Fast, clear tracking for your shipments.</span>
    </footer>
</body>
</html>
