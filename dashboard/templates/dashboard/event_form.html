{% extends "base_admin.html" %}

{% block title %}Status Update{% endblock %}

{% block content %}
<section class="panel">
    <div class="panel-header">
        <h1>{% if event %}Edit{% else %}Add{% endif %} Status</h1>
        <span class="muted">Tracking {{ tracking.code }}</span>
    </div>
    <form method="post" class="form-grid">
        {% csrf_token %}
        <label>Status</label>
        {{ form.status }}
        <label>Location</label>
        {{ form.location }}
        <label>Details</label>
        {{ form.details }}
        <label>Event time</label>
        {{ form.event_time }}
        <button class="primary-btn" type="submit">Save</button>
    </form>
</section>
{% endblock %}
